<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign In — DevAgent</title>
  <meta name="description" content="Sign in to DevAgent — AI-powered code review and test generation platform."/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="auth.css"/>
</head>
<body>
<div class="auth-bg">
  <div class="auth-card" role="main">

    <!-- Logo -->
    <div class="auth-logo">
      <div class="auth-logo-icon" aria-hidden="true">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/>
        </svg>
      </div>
      <span class="auth-logo-text">DevAgent</span>
      <span class="auth-logo-badge">AI</span>
    </div>

    <!-- Heading -->
    <h1 class="auth-title">Welcome back</h1>
    <p class="auth-subtitle">Sign in to your DevAgent account to continue</p>

    <!-- Alert banner -->
    <div id="alert" class="auth-alert" role="alert" aria-live="polite"></div>

    <!-- Form -->
    <form id="loginForm" class="auth-form" novalidate>

      <div class="form-group">
        <label class="form-label" for="email">Email address</label>
        <input
          class="form-input"
          type="email"
          id="email"
          name="email"
          placeholder="you@example.com"
          autocomplete="email"
          required
          aria-describedby="emailError"
        />
        <span class="form-error" id="emailError"></span>
      </div>

      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <div class="form-input-wrap">
          <input
            class="form-input"
            type="password"
            id="password"
            name="password"
            placeholder="Your password"
            autocomplete="current-password"
            required
            aria-describedby="passwordError"
          />
          <button class="pw-toggle" type="button" id="pwToggle" aria-label="Toggle password visibility">
            <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
        <span class="form-error" id="passwordError"></span>
      </div>

      <div style="text-align:right; margin-top:-8px;">
        <a href="/forgot-password.html" style="font-size:.8rem; color:var(--color-primary-h); text-decoration:none;">Forgot password?</a>
      </div>

      <button class="btn-primary" type="submit" id="submitBtn">
        <div class="btn-spinner" aria-hidden="true"></div>
        <span class="btn-label">Sign In</span>
      </button>

    </form>

    <!-- Footer -->
    <div class="auth-footer">
      Don't have an account? <a href="/signup.html">Create one free</a>
    </div>

  </div>
</div>
<script src="auth.js"></script>
<script src="login.js"></script>
</body>
</html>
