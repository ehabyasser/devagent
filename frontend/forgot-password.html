<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Forgot Password — DevAgent</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="auth.css"/>
</head>
<body>
<div class="auth-bg">
  <div class="auth-card" role="main">

    <div class="auth-logo">
      <div class="auth-logo-icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/>
        </svg>
      </div>
      <span class="auth-logo-text">DevAgent</span>
    </div>

    <!-- Form view -->
    <div id="viewForm">
      <h1 class="auth-title">Reset your password</h1>
      <p class="auth-subtitle">Enter your email and we'll send you a reset link</p>

      <div id="alert" class="auth-alert" role="alert" aria-live="polite"></div>

      <form id="forgotForm" class="auth-form" novalidate>
        <div class="form-group">
          <label class="form-label" for="email">Email address</label>
          <input class="form-input" type="email" id="email" placeholder="you@example.com" autocomplete="email" required/>
          <span class="form-error" id="emailError"></span>
        </div>
        <button class="btn-primary" type="submit" id="submitBtn">
          <div class="btn-spinner"></div>
          <span class="btn-label">Send Reset Link</span>
        </button>
      </form>
    </div>

    <!-- Sent view -->
    <div id="viewSent" style="display:none;text-align:center;">
      <div class="auth-icon-circle info" style="margin-bottom:20px;">
        <svg width="32" height="32" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
          <polyline points="22,6 12,13 2,6"/>
        </svg>
      </div>
      <h1 class="auth-title" style="text-align:center;">Check your inbox</h1>
      <p class="auth-subtitle" style="text-align:center;margin-bottom:24px;">
        If this email is registered, we've sent a password reset link. The link expires in 1 hour.
      </p>
      <p style="font-size:.8rem;color:var(--color-subtle);text-align:center;">
        Didn't receive it? Check your spam folder or
        <a href="/forgot-password.html" style="color:var(--color-primary-h);">try again</a>.
      </p>
    </div>

    <div class="auth-footer">
      <a href="/login.html">← Back to Sign In</a>
    </div>

  </div>
</div>
<script src="auth.js"></script>
<script src="forgot-password.js"></script>
</body>
</html>
