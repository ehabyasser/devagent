<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Verify Email — DevAgent</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="auth.css"/>
</head>
<body>
<div class="auth-bg">
  <div class="auth-card" role="main">

    <div class="auth-logo">
      <div class="auth-logo-icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/>
        </svg>
      </div>
      <span class="auth-logo-text">DevAgent</span>
      <span class="auth-logo-badge">AI</span>
    </div>

    <!-- Loading state -->
    <div id="stateLoading" style="text-align:center;padding:16px 0;">
      <div style="width:48px;height:48px;border:3px solid rgba(99,102,241,0.2);border-top-color:#6366f1;border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 20px;"></div>
      <p style="color:var(--color-muted);">Verifying your email…</p>
    </div>

    <!-- Success state -->
    <div id="stateSuccess" style="display:none;text-align:center;">
      <div class="auth-icon-circle success" style="margin-bottom:20px;">
        <svg width="32" height="32" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
          <polyline points="20 6 9 17 4 12"/>
        </svg>
      </div>
      <h1 class="auth-title" style="text-align:center;">Email verified!</h1>
      <p class="auth-subtitle" style="text-align:center;margin-bottom:28px;">Your account is now active. Redirecting you to sign in…</p>
      <a href="/login.html" class="btn-primary" style="text-decoration:none;display:flex;">
        <span class="btn-label">Sign In Now</span>
      </a>
    </div>

    <!-- Error state -->
    <div id="stateError" style="display:none;text-align:center;">
      <div class="auth-icon-circle error" style="margin-bottom:20px;">
        <svg width="32" height="32" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
          <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
      </div>
      <h1 class="auth-title" style="text-align:center;">Verification failed</h1>
      <p id="errorMessage" class="auth-subtitle" style="text-align:center;margin-bottom:28px;"></p>

      <!-- Resend form -->
      <div id="resendSection">
        <p style="font-size:.84rem;color:var(--color-muted);margin-bottom:16px;">Enter your email to receive a new verification link:</p>
        <div class="form-group" style="margin-bottom:16px;">
          <input class="form-input" type="email" id="resendEmail" placeholder="you@example.com" autocomplete="email"/>
        </div>
        <button class="btn-primary" type="button" id="resendBtn">
          <div class="btn-spinner"></div>
          <span class="btn-label">Resend Verification Email</span>
        </button>
        <div id="resendAlert" class="auth-alert" style="margin-top:16px;" role="alert"></div>
      </div>
    </div>

    <div class="auth-footer">
      <a href="/login.html">← Back to Sign In</a>
    </div>

  </div>
</div>
<style>@keyframes spin { to { transform:rotate(360deg); } }</style>
<script src="auth.js"></script>
<script src="verify-email.js"></script>
</body>
</html>
