<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Reset Password — DevAgent</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="auth.css"/>
</head>
<body>
<div class="auth-bg">
  <div class="auth-card" role="main">

    <div class="auth-logo">
      <div class="auth-logo-icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/>
        </svg>
      </div>
      <span class="auth-logo-text">DevAgent</span>
    </div>

    <!-- Form view -->
    <div id="viewForm">
      <h1 class="auth-title">Set new password</h1>
      <p class="auth-subtitle">Choose a strong password for your account</p>

      <div id="alert" class="auth-alert" role="alert" aria-live="polite"></div>

      <form id="resetForm" class="auth-form" novalidate>
        <div class="form-group">
          <label class="form-label" for="password">New password</label>
          <div class="form-input-wrap">
            <input class="form-input" type="password" id="password" placeholder="At least 8 characters" autocomplete="new-password" required/>
            <button class="pw-toggle" type="button" id="pwToggle" aria-label="Show/hide password">
              <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
          <div class="pw-strength" id="pwStrength">
            <div class="pw-strength-bar"><div class="pw-strength-fill" id="pwStrengthFill"></div></div>
            <span class="pw-strength-label" id="pwStrengthLabel"></span>
          </div>
          <span class="form-error" id="passwordError"></span>
        </div>

        <div class="form-group">
          <label class="form-label" for="confirm">Confirm password</label>
          <input class="form-input" type="password" id="confirm" placeholder="Repeat your new password" autocomplete="new-password" required/>
          <span class="form-error" id="confirmError"></span>
        </div>

        <button class="btn-primary" type="submit" id="submitBtn">
          <div class="btn-spinner"></div>
          <span class="btn-label">Reset Password</span>
        </button>
      </form>
    </div>

    <!-- Success view -->
    <div id="viewSuccess" style="display:none;text-align:center;">
      <div class="auth-icon-circle success" style="margin-bottom:20px;">
        <svg width="32" height="32" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
          <polyline points="20 6 9 17 4 12"/>
        </svg>
      </div>
      <h1 class="auth-title" style="text-align:center;">Password reset!</h1>
      <p class="auth-subtitle" style="text-align:center;margin-bottom:28px;">
        Your password has been updated successfully. You can now sign in.
      </p>
      <a href="/login.html" class="btn-primary" style="text-decoration:none;display:flex;">
        <span class="btn-label">Sign In</span>
      </a>
    </div>

    <!-- Invalid token view -->
    <div id="viewInvalid" style="display:none;text-align:center;">
      <div class="auth-icon-circle error" style="margin-bottom:20px;">
        <svg width="32" height="32" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
          <circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/>
        </svg>
      </div>
      <h1 class="auth-title" style="text-align:center;">Link expired</h1>
      <p class="auth-subtitle" style="text-align:center;margin-bottom:28px;">
        This reset link has expired or already been used. Please request a new one.
      </p>
      <a href="/forgot-password.html" class="btn-primary" style="text-decoration:none;display:flex;">
        <span class="btn-label">Request New Link</span>
      </a>
    </div>

    <div class="auth-footer"><a href="/login.html">← Back to Sign In</a></div>
  </div>
</div>
<script src="auth.js"></script>
<script src="reset-password.js"></script>
</body>
</html>
