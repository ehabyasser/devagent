<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Create Account — DevAgent</title>
  <meta name="description" content="Create your DevAgent account — AI-powered code review and test generation for engineering teams."/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="auth.css"/>
</head>
<body>
<div class="auth-bg">
  <div class="auth-card" role="main">

    <!-- Logo -->
    <div class="auth-logo">
      <div class="auth-logo-icon" aria-hidden="true">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/>
        </svg>
      </div>
      <span class="auth-logo-text">DevAgent</span>
      <span class="auth-logo-badge">AI</span>
    </div>

    <!-- Heading -->
    <h1 class="auth-title">Create your account</h1>
    <p class="auth-subtitle">Start reviewing code and generating tests with AI</p>

    <!-- Alert banner -->
    <div id="alert" class="auth-alert" role="alert" aria-live="polite"></div>

    <!-- Form -->
    <form id="signupForm" class="auth-form" novalidate>

      <div class="form-group">
        <label class="form-label" for="fullName">Full name</label>
        <input
          class="form-input"
          type="text"
          id="fullName"
          name="full_name"
          placeholder="John Doe"
          autocomplete="name"
          aria-describedby="nameError"
        />
        <span class="form-error" id="nameError"></span>
      </div>

      <div class="form-group">
        <label class="form-label" for="email">Work email</label>
        <input
          class="form-input"
          type="email"
          id="email"
          name="email"
          placeholder="you@company.com"
          autocomplete="email"
          required
          aria-describedby="emailError"
        />
        <span class="form-error" id="emailError"></span>
      </div>

      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <div class="form-input-wrap">
          <input
            class="form-input"
            type="password"
            id="password"
            name="password"
            placeholder="At least 8 characters"
            autocomplete="new-password"
            required
            aria-describedby="passwordError"
          />
          <button class="pw-toggle" type="button" id="pwToggle" aria-label="Toggle password visibility">
            <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
        <!-- Password strength meter -->
        <div class="pw-strength" id="pwStrength" aria-live="polite">
          <div class="pw-strength-bar">
            <div class="pw-strength-fill" id="pwStrengthFill"></div>
          </div>
          <span class="pw-strength-label" id="pwStrengthLabel"></span>
        </div>
        <span class="form-error" id="passwordError"></span>
      </div>

      <button class="btn-primary" type="submit" id="submitBtn">
        <div class="btn-spinner" aria-hidden="true"></div>
        <span class="btn-label">Create Account</span>
      </button>

      <p style="font-size:.76rem;color:var(--color-subtle);text-align:center;margin-top:-4px;line-height:1.5;">
        By creating an account you agree to our
        <a href="#" style="color:var(--color-primary-h);text-decoration:none;">Terms</a> and
        <a href="#" style="color:var(--color-primary-h);text-decoration:none;">Privacy Policy</a>.
      </p>

    </form>

    <!-- Footer -->
    <div class="auth-footer">
      Already have an account? <a href="/login.html">Sign in</a>
    </div>

  </div>
</div>
<script src="auth.js"></script>
<script src="signup.js"></script>
</body>
</html>
