services:
  - type: web
    name: devagent
    runtime: python
    pythonVersion: "3.11.9"
    buildCommand: pip install -r requirements.txt
    startCommand: python backend/main.py
    envVars:
      - key: LLM_PROVIDER
        value: gemini
      - key: GEMINI_MODEL
        value: gemini-2.5-flash
      - key: GEMINI_API_KEY
        sync: false   # Set this manually in Render dashboard
      - key: ALLOWED_ORIGINS
        value: '["*"]'
      - key: PORT
        value: "10000"
      - key: PYTHONPATH
        value: /opt/render/project/src
    plan: free

