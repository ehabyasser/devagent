services:
  - type: web
    name: devagent
    runtime: python
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: "false"
      - key: LLM_PROVIDER
        value: gemini
      - key: GEMINI_MODEL
        value: gemini-3.5-flash
      - key: GEMINI_API_KEY
        sync: false   # Set manually in Render dashboard
      - key: ALLOWED_ORIGINS
        value: '["https://devagent-1-hvzj.onrender.com"]'
      - key: PORT
        value: "10000"
      - key: PYTHONPATH
        value: /opt/render/project/src
      - key: DATABASE_PATH
        value: /data/devagent.db   # Persistent disk mount
      # ── Auth (Phase 1) ────────────────────────────────────────────────────────
      - key: JWT_SECRET
        sync: false   # Generate with: python -c "import secrets; print(secrets.token_hex(32))"
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "15"
      - key: REFRESH_TOKEN_EXPIRE_DAYS
        value: "30"
      - key: COOKIE_SECURE
        value: "true"   # HTTPS only on Render
      - key: APP_BASE_URL
        value: https://devagent-1-hvzj.onrender.com
      - key: APP_NAME
        value: DevAgent
      - key: EMAIL_VERIFICATION_ENABLED
        value: "false"   # Set true once SMTP is configured
      # ── SMTP (optional — configure for email verification/reset) ──────────────
      # - key: SMTP_HOST
      #   value: smtp.mailgun.org
      # - key: SMTP_PORT
      #   value: "587"
      # - key: SMTP_USER
      #   sync: false
      # - key: SMTP_PASSWORD
      #   sync: false
      # - key: SMTP_FROM
      #   value: "DevAgent <noreply@devagent.io>"
      - key: DOCS_ENABLED
        value: "false"   # Disable Swagger UI in production
    plan: starter   # Upgraded from free for persistent disk support

# ── Persistent disk ── REQUIRED for SQLite to survive deploys ────────────────
disk:
  - name: devagent-data
    mountPath: /data
    sizeGB: 1
